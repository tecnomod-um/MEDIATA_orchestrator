name: MEDIATA ORCHESTRATOR CI

on:
  push:
    branches: [dev, main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Test (with coverage)
        run: mvn -B -q verify

      - name: Generate coverage badge
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: false
          jacoco-csv-file: ""
          fail-if-no-report: true

      - name: Prepare badges folder
        run: |
          mkdir -p badges
          mv .github/badges/jacoco.svg badges/coverage.svg

      - name: Commit coverage badge (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git diff --cached --quiet || git commit -m "ci: update coverage badge"
          git push

  update-parent:
    name: Bump orchestrator in umbrella repo
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout combined repo (@main)
        uses: actions/checkout@v4
        with:
          repository: tecnomod-um/MEDIATA_project
          token: ${{ secrets.PARENT_REPO_TOKEN }}
          ref: main
          path: monorepo
          fetch-depth: 0
          submodules: recursive
          persist-credentials: true

      - name: Bump orchestrator submodule
        working-directory: monorepo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git -C MEDIATA_orchestrator fetch origin "${{ github.sha }}"
          git -C MEDIATA_orchestrator checkout "${{ github.sha }}"
          git add MEDIATA_orchestrator
          if ! git diff --cached --quiet; then
            git commit -m "ci: bump MEDIATA_orchestrator to ${{ github.sha }}"
            git push origin main
          else
            echo "No changes to submodule"
          fi
