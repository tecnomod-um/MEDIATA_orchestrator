name: MEDIATA ORCHESTRATOR CI

on:
  push:
    branches:
      - dev
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout orchestrator
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Run Maven unit tests
        run: mvn test -B

  update-parent:
    name: Update MEDIATA_project submodule
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout combined repo
        uses: actions/checkout@v3
        with:
          repository: tecnomod-um/MEDIATA_project
          token: ${{ secrets.PARENT_REPO_TOKEN }}
          path: monorepo
          fetch-depth: 0

      - name: Point submodule at new #${{ github.sha }}
        working-directory: monorepo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # make sure .gitmodules for MEDIATA_orchestrator tracks 'main'
          git submodule update --init --remote MEDIATA_orchestrator
          git add MEDIATA_orchestrator

          # only commit if pointer changed
          if ! git diff --cached --quiet; then
            git commit -m "ci: bump MEDIATA_orchestrator to ${{ github.sha }}"
            git push origin main
          else
            echo "No submodule changes to commit"
          fi
