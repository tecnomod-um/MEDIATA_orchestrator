version: "3.9"

networks:
  mediata-network:
    driver: bridge

volumes:
  mongodb-data:
  elasticsearch-data:
  kerby-data:
  ollama-models:

services:
  mongodb:
    image: mongo:7.0
    container_name: mediata-mongodb
    restart: unless-stopped
    ports:
      - "${MONGODB_HOST_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: ${SNOWSTORM_ES_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:8.11.1}
    container_name: mediata-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - node.store.allow_mmap=false
      - node.name=snowstorm
      - cluster.name=snowstorm-cluster
    ports:
      - "${SNOWSTORM_ES_HOST_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/"]
      interval: 15s
      timeout: 5s
      retries: 5

  snowstorm:
    image: ${SNOWSTORM_IMAGE:-snomedinternational/snowstorm:latest}
    container_name: mediata-snowstorm
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    entrypoint:
      - java
      - -Xms1g
      - -Xmx2g
      - --add-opens=java.base/java.lang=ALL-UNNAMED
      - --add-opens=java.base/java.util=ALL-UNNAMED
      - -cp
      - "@/app/jib-classpath-file"
      - org.snomed.snowstorm.SnowstormApplication
      - --elasticsearch.urls=http://elasticsearch:9200
      - --spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
    environment:
      - SNOMED_SERVER_BRANCH=MAIN
    ports:
      - "${SNOWSTORM_HOST_PORT:-9100}:8080"
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Optional: RDF Builder (enabled by profile "rdf")
  rdf-builder:
    profiles: ["rdf"]
    build:
      context: .
      dockerfile: Dockerfile.rdf-builder
    container_name: mediata-rdf-builder
    restart: unless-stopped
    ports:
      - "${RDF_BUILDER_HOST_PORT:-8000}:8000"
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Optional: FHIR API (enabled by profile "fhir")
  fhir-api:
    profiles: ["fhir"]
    build:
      context: .
      dockerfile: Dockerfile.fhir-api
    container_name: mediata-fhir-api
    restart: unless-stopped
    ports:
      - "${FHIR_API_HOST_PORT:-8001}:8001"
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 180s

  # Ollama LLM service - starts automatically like Snowstorm
  ollama:
    image: ollama/ollama:latest
    container_name: mediata-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    networks:
      - mediata-network
    volumes:
      - ollama-models:/root/.ollama
    # Override entrypoint to auto-pull llama2 model on startup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Start Ollama server in background
        /bin/ollama serve &
        OLLAMA_PID=$$!
        
        # Wait for Ollama to be ready (check with ollama list command)
        echo "Waiting for Ollama to start..."
        for i in $$(seq 1 30); do
          if /bin/ollama list >/dev/null 2>&1; then
            echo "Ollama is ready"
            break
          fi
          sleep 2
        done
        
        # Pull llama2 model if not already present
        if ! /bin/ollama list | grep -q llama2; then
          echo "Pulling llama2 model (first time - ~3.8GB)..."
          /bin/ollama pull llama2
          echo "llama2 model ready"
        else
          echo "llama2 model already available"
        fi
        
        # Keep container running with Ollama server
        wait $$OLLAMA_PID
    healthcheck:
      # Health check verifies both Ollama is running AND model is available
      test: ["CMD", "/bin/sh", "-c", "/bin/ollama list | grep -q llama2"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s  # Give 5 minutes for model download on first start

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.prebuilt
    container_name: mediata-orchestrator
    restart: unless-stopped

    # IMPORTANT:
    # Orchestrator depends on core services: MongoDB, Snowstorm, and Ollama
    depends_on:
      mongodb:
        condition: service_healthy
      snowstorm:
        condition: service_healthy
      ollama:
        condition: service_healthy

    ports:
      - "${ORCHESTRATOR_HOST_PORT:-8088}:8088"
      - "${KERBEROS_HOST_PORT:-8089}:8089"

    environment:
      - PORT=${PORT:-8088}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/mediata}
      - JWT_SECRET=${JWT_SECRET}
      - KERBEROS_PORT=${KERBEROS_PORT:-8089}

      # These URLs can point to containers when profiles enabled, otherwise just leave defaults.
      - PYURL=${PYURL:-http://rdf-builder:8000}
      - PYPORT=${PYPORT:-8000}
      - FHIRPORT=${FHIRPORT:-8001}

      # Spring toggles (used by your /api/system/capabilities DTO, and by local launcher configs)
      - PY_LAUNCHER_ENABLED=${PY_LAUNCHER_ENABLED:-true}
      - FHIR_LAUNCHER_ENABLED=${FHIR_LAUNCHER_ENABLED:-true}

      # Ollama LLM configuration - points to ollama container when using ollama profile
      # If not using ollama profile, this should be set to external Ollama instance
      - SPRING_AI_OLLAMA_BASE_URL=${SPRING_AI_OLLAMA_BASE_URL:-http://ollama:11434}
      - LLM_ENABLED=${LLM_ENABLED:-true}

      - SNOWSTORM_HOST_PORT=${SNOWSTORM_HOST_PORT:-9100}
      - SNOWSTORM_ES_HOST_PORT=${SNOWSTORM_ES_HOST_PORT:-9200}
      - JAVA_TOOL_OPTIONS=-Djava.net.preferIPv4Stack=true -Djava.net.preferIPv4Addresses=true

    extra_hosts:
      - "localhost:host-gateway"

    volumes:
      - kerby-data:/app/kerby
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/taniwha/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
