version: '3.8'

networks:
  mediata-network:
    driver: bridge

volumes:
  mongodb-data:
  elasticsearch-data:
  kerby-data:

services:
  # MongoDB database
  mongodb:
    image: mongo:7.0
    container_name: mediata-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch for Snowstorm
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: mediata-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - node.store.allow_mmap=false
      - node.name=snowstorm
      - cluster.name=snowstorm-cluster
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Snowstorm SNOMED CT terminology server
  snowstorm:
    image: snomedinternational/snowstorm:latest
    container_name: mediata-snowstorm
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    entrypoint:
      - java
      - -Xms1g
      - -Xmx2g
      - --add-opens=java.base/java.lang=ALL-UNNAMED
      - --add-opens=java.base/java.util=ALL-UNNAMED
      - -cp
      - "@/app/jib-classpath-file"
      - org.snomed.snowstorm.SnowstormApplication
      - --elasticsearch.urls=http://elasticsearch:9200
      # Note: Security is disabled for internal use. In production, enable authentication
      # and configure proper access controls via environment variables or reverse proxy
      - --spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
    environment:
      - SNOMED_SERVER_BRANCH=MAIN
    ports:
      - "9100:8080"
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # RDF Builder Python service
  rdf-builder:
    build:
      context: .
      dockerfile: Dockerfile.rdf-builder
    container_name: mediata-rdf-builder
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # FHIR API Python service
  fhir-api:
    build:
      context: .
      dockerfile: Dockerfile.fhir-api
    container_name: mediata-fhir-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MEDIATA Orchestrator (main application)
  #
  # Uses Dockerfile.prebuilt which requires a pre-built JAR
  # Run ./build-and-deploy.sh OR manually build first: mvn clean package -DskipTests
  #
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.prebuilt
    container_name: mediata-orchestrator
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      snowstorm:
        condition: service_healthy
      rdf-builder:
        condition: service_healthy
      fhir-api:
        condition: service_healthy
    ports:
      - "8088:8088"
      - "8089:8089"  # Kerberos KDC port
    environment:
      - PORT=8088
      - MONGODB_URI=mongodb://mongodb:27017/mediata
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - KERBEROS_PORT=8089
      - PYURL=http://rdf-builder:8000
      - PYPORT=8000
      - FHIRPORT=8001
      - SNOWSTORM_HOST_PORT=9100
      - SNOWSTORM_ES_HOST_PORT=9200
    volumes:
      - kerby-data:/app/kerby
    networks:
      - mediata-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/taniwha/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
