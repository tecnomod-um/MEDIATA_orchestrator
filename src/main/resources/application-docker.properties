# Docker Compose Profile Configuration
# This profile is activated when running in Docker Compose
# It disables the programmatic launching of services
# General config (inherited from base application.properties)
server.port=${env.PORT:8088}
server.servlet.context-path=/taniwha
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.data.mongodb.uri=${env.MONGODB_URI:mongodb://mongodb:27017/mediata}
overwrite.node=true
# Security config
jwt.secret=${env.JWT_SECRET}
jwt.expiration=10800
# Logging
logging.level.org.taniwha=DEBUG
logging.file.name=logs/app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.logback.rollingpolicy.max-history=30
# Node heartbeat configs
heartbeat.timeout.minutes=2
health.check.interval.ms=60000
# Kerberos Configuration
kerberos.realm=TANIWHA-REALM
kerberos.kdc.port=${env.KERBEROS_PORT:8089}
kerberos.workdir=/app/kerby
# Python RDF project - use service URLs instead of local paths
rdfbuilder.path=${env.PYPATH:mediata-rdf-builder/main.py}
rdfbuilder.csvpath=${env.PYPATH:mediata-rdf-builder/csv_files}
rdfbuilder.venv=${env.PYENV:mediata-rdf-builder/venv}
rdfbuilder.service.url=${env.PYURL:http://rdf-builder:8000}
rdfbuilder.dependencies=${env.PYDEPL:fastapi, uvicorn, requests, typing, rdflib, morph_kgc}
rdfbuilder.port=${env.PYPORT:8000}
# Python FHIR project - use service URLs instead of local paths
fhir.path=${env.FHIRPATH:InteroperabilityFHIRAPI}
fhir.venv=${env.FHIRPATH:InteroperabilityFHIRAPI/venv}
fhir.dependencies=${env.FHIRDEPL:numpy, spacy, nltk, scikit-learn, sentence-transformers, openai, torch, requests, farm-haystack[openai], fastapi, uvicorn}
fhir.port=${env.FHIRPORT:8001}
# Snowstorm settings - use container names
snowstorm.image=${env.SNOWSTORM_IMAGE:snomedinternational/snowstorm:latest}
snowstorm.esImage=${env.SNOWSTORM_ES_IMAGE:docker.elastic.co/elasticsearch/elasticsearch:8.11.1}
snowstorm.network=${env.SNOWSTORM_NETWORK:mediata-network}
snowstorm.containerName=${env.SNOWSTORM_CONTAINER:mediata-snowstorm}
snowstorm.esContainerName=${env.SNOWSTORM_ES_CONTAINER:mediata-elasticsearch}
snowstorm.hostPort=${env.SNOWSTORM_HOST_PORT:9100}
snowstorm.containerPort=${env.SNOWSTORM_CONTAINER_PORT:8080}
snowstorm.esHostPort=${env.SNOWSTORM_ES_HOST_PORT:9200}
snowstorm.esVolume=${env.SNOWSTORM_ES_VOLUME:elasticsearch-data}
snowstorm.startupTimeoutSeconds=${env.SNOWSTORM_TIMEOUT:120}
snowstorm.disableAuth=${env.SNOWSTORM_DISABLE_AUTH:true}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.security.enabled=false

python.launcher.enabled=${env.PY_LAUNCHER_ENABLED:true}
fhir.launcher.enabled=${env.FHIR_LAUNCHER_ENABLED:true}

# Embedding model (Docker)
# Inherits the PubMedBERT URLs from application.properties by default.
# Override per-container by setting EMBEDDING_MODEL_URI / EMBEDDING_TOKENIZER_URI
# environment variables in docker-compose.yml or your container runtime.
spring.ai.embedding.transformer.onnx.model-uri=${env.EMBEDDING_MODEL_URI:https://huggingface.co/Dev-SN/pubmedbert-base-embeddings-onnx/resolve/main/onnx/model.onnx}
spring.ai.embedding.transformer.tokenizer.uri=${env.EMBEDDING_TOKENIZER_URI:https://huggingface.co/Dev-SN/pubmedbert-base-embeddings-onnx/resolve/main/tokenizer.json}

# Cache downloaded model inside the container
spring.ai.embedding.transformer.cache.enabled=true
spring.ai.embedding.transformer.cache.directory=${java.io.tmpdir}/spring-ai-onnx-model

# LLM Text Generation Configuration (Ollama in Docker)
llm.enabled=${env.LLM_ENABLED:true}
spring.ai.ollama.base-url=${env.SPRING_AI_OLLAMA_BASE_URL:http://ollama:11434}
spring.ai.ollama.chat.enabled=${env.SPRING_AI_OLLAMA_CHAT_ENABLED:true}
spring.ai.ollama.chat.options.model=${env.SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL:llama2}
spring.ai.ollama.chat.options.temperature=0.7

# OpenMed NER service (Docker container when using "openmed" profile)
openmed.service.url=${env.OPENMED_SERVICE_URL:http://openmed-service:8002}
openmed.service.enabled=${env.OPENMED_SERVICE_ENABLED:true}

# Snowstorm configuration
snowstorm.enabled=${env.SNOWSTORM_ENABLED:true}
snowstorm.api.url=${env.SNOWSTORM_API_URL:http://mediata-snowstorm:8080}
snowstorm.api.branch=${env.SNOWSTORM_BRANCH:MAIN}