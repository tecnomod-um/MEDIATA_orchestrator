# General config
server.port=${env.PORT}
server.servlet.context-path=/taniwha
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.data.mongodb.uri=${env.MONGODB_URI}
overwrite.node=true

# Security config
jwt.secret=${env.JWT_SECRET}
jwt.expiration=3600

# Logging
logging.level.org.taniwha=DEBUG
logging.file.name=logs/app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.logback.rollingpolicy.max-history=30

# Node heartbeat configs
heartbeat.timeout.minutes=2
health.check.interval.ms=60000

# Kerberos Configuration
kerberos.realm=TANIWHA-REALM
kerberos.kdc.port=${env.KERBEROS_PORT}
kerberos.workdir=kerby

