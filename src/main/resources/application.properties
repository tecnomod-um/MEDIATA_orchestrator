# General config
server.port=${env.PORT:8088}
server.servlet.context-path=/taniwha
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.data.mongodb.uri=${env.MONGODB_URI}
overwrite.node=true
# Security config
jwt.secret=${env.JWT_SECRET}
jwt.expiration=10800
# Logging
logging.level.org.taniwha=DEBUG
logging.file.name=logs/app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.logback.rollingpolicy.max-history=30
# Node heartbeat configs
heartbeat.timeout.minutes=2
health.check.interval.ms=60000
# Kerberos Configuration
kerberos.realm=TANIWHA-REALM
kerberos.kdc.port=${env.KERBEROS_PORT:8089}
kerberos.workdir=../kerby
# Python RDF project path
rdfbuilder.path=${env.PYPATH:mediata-rdf-builder/main.py}
rdfbuilder.csvpath=${env.PYPATH:mediata-rdf-builder/csv_files}
rdfbuilder.venv=${env.PYENV:mediata-rdf-builder/venv}
rdfbuilder.service.url=${env.PYURL:http://localhost:8000}
rdfbuilder.dependencies=${env.PYDEPL:fastapi, uvicorn, requests, typing, rdflib, morph_kgc}
rdfbuilder.port=${env.PYPORT:8000}
# Python FHIR project path
fhir.path=${env.FHIRPATH:InteroperabilityFHIRAPI}
fhir.venv=${env.FHIRPATH:InteroperabilityFHIRAPI/venv}
fhir.dependencies=${env.FHIRDEPL:numpy, spacy, nltk, scikit-learn, sentence-transformers, openai, torch, requests, farm-haystack[openai], fastapi, uvicorn}
fhir.port=${env.FHIRPORT:8001}
# OpenMed Terminology Service (Python / FastAPI)
openmed.path=${env.OPENMED_PATH:mediata-openmed}
openmed.dependencies=${env.OPENMED_DEPS:fastapi, uvicorn[standard], transformers, torch}
openmed.port=${env.OPENMED_PORT:8002}
openmed.service.url=${env.OPENMED_URL:http://localhost:8002}
openmed.launcher.enabled=${env.OPENMED_LAUNCHER_ENABLED:true}
openmed.enabled=${env.OPENMED_ENABLED:true}
openmed.batch.size=${env.OPENMED_BATCH_SIZE:5}
# Generous timeout: Meditron3-Gemma2-2B generates ~10s per value on CPU;
# a 2-column batch (3 values each) = ~60s.  Use 300s (5 min) to be safe.
openmed.timeout.ms=${env.OPENMED_TIMEOUT_MS:300000}
# Java-side CompletableFuture timeout: must exceed openmed.timeout.ms/1000.
description.timeoutSeconds=${env.DESCRIPTION_TIMEOUT_SECONDS:360}
# server.ssl.key-store=/home/danibanez/.keystore
# server.ssl.key-store-password=changeit
# snowstorm settings
snowstorm.image=${env.SNOWSTORM_IMAGE:snomedinternational/snowstorm:latest}
snowstorm.esImage=${env.SNOWSTORM_ES_IMAGE:docker.elastic.co/elasticsearch/elasticsearch:8.11.1}
snowstorm.network=${env.SNOWSTORM_NETWORK:snowstorm-net}
snowstorm.containerName=${env.SNOWSTORM_CONTAINER:snowstorm}
snowstorm.esContainerName=${env.SNOWSTORM_ES_CONTAINER:elasticsearch}
snowstorm.hostPort=${env.SNOWSTORM_HOST_PORT:9100}
snowstorm.containerPort=${env.SNOWSTORM_CONTAINER_PORT:8080}
snowstorm.esHostPort=${env.SNOWSTORM_ES_HOST_PORT:9200}
snowstorm.esVolume=${env.SNOWSTORM_ES_VOLUME:snowstorm-es-data}
snowstorm.startupTimeoutSeconds=${env.SNOWSTORM_TIMEOUT:120}
snowstorm.disableAuth=${env.SNOWSTORM_DISABLE_AUTH:true}
snowstorm.enabled=${env.SNOWSTORM_ENABLED:true}
snowstorm.api.url=${env.SNOWSTORM_API_URL:http://localhost:9100}
snowstorm.api.branch=${env.SNOWSTORM_BRANCH:MAIN}

python.launcher.enabled=${env.PY_LAUNCHER_ENABLED:true}
fhir.launcher.enabled=${env.FHIR_LAUNCHER_ENABLED:true}

# Embedding model selection
# NeuML/pubmedbert-base-embeddings — PubMedBERT fine-tuned for biomedical semantic similarity (768 dims).
# Pre-trained on 21M PubMed abstracts; natively understands clinical abbreviations.
# Run EmbeddingModelBenchmarkTest to compare models and see exact pair-similarity scores.
#
# NOTE: The NeuML HuggingFace repo does not publish an ONNX file; we use the ONNX export from
# Dev-SN/pubmedbert-base-embeddings-onnx (same tokenizer, same base weights).
# Quantized variant (onnx/model_quantized.onnx, ~110 MB) is available as a lighter alternative.
spring.ai.embedding.transformer.onnx.model-uri=https://huggingface.co/Dev-SN/pubmedbert-base-embeddings-onnx/resolve/main/onnx/model.onnx
spring.ai.embedding.transformer.tokenizer.uri=https://huggingface.co/Dev-SN/pubmedbert-base-embeddings-onnx/resolve/main/tokenizer.json
#
# Lighter quantized alternative (~110 MB, slightly lower quality):
#spring.ai.embedding.transformer.onnx.model-uri=https://huggingface.co/Dev-SN/pubmedbert-base-embeddings-onnx/resolve/main/onnx/model_quantized.onnx
#spring.ai.embedding.transformer.tokenizer.uri=https://huggingface.co/Dev-SN/pubmedbert-base-embeddings-onnx/resolve/main/tokenizer.json
#
# Fallback to default all-MiniLM-L6-v2 (384 dims, bundled in classpath — fastest, general-purpose):
# Comment out the two spring.ai.embedding lines above to use the bundled default.
#
# Other candidates (run EmbeddingModelBenchmarkTest for comparative scores):
#   all-mpnet-base-v2 (768 dims, best general sentence-transformer):
#   spring.ai.embedding.transformer.onnx.model-uri=https://huggingface.co/sentence-transformers/all-mpnet-base-v2/resolve/main/onnx/model.onnx
#   spring.ai.embedding.transformer.tokenizer.uri=https://huggingface.co/sentence-transformers/all-mpnet-base-v2/resolve/main/tokenizer.json

# Cache downloaded model
spring.ai.embedding.transformer.cache.enabled=true
spring.ai.embedding.transformer.cache.directory=${java.io.tmpdir}/spring-ai-onnx-model

# Embedding and metadata generation settings
mapping.service.max-column-desc-tasks=60
mapping.service.max-enum=120
mapping.service.schema-to-column-threshold=0.33
mapping.service.column-cluster-threshold=0.56
mapping.service.max-suggestions-per-schema-field=6
mapping.service.max-schemaless-targets=40
mapping.service.max-columns-per-mapping=10
mapping.service.noise-document-frequency-fraction=0.22
mapping.service.noise-document-frequency-min-count=4
mapping.service.suffix-noise-min-count=2
mapping.service.description-concurrency-window=2
# Meditron3-Gemma2-2B takes ~10s/value on CPU.  Keep batches small (2 columns)
# so each HTTP call to /describe_batch stays well within openmed.timeout.ms.
mapping.service.description-batch-columns=2