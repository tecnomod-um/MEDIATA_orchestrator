# General config
server.port=${env.PORT:8088}
server.servlet.context-path=/taniwha
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.data.mongodb.uri=${env.MONGODB_URI}
overwrite.node=true
# Security config
jwt.secret=${env.JWT_SECRET}
jwt.expiration=10800
# Logging
logging.level.org.taniwha=DEBUG
logging.file.name=logs/app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.logback.rollingpolicy.max-history=30
# Node heartbeat configs
heartbeat.timeout.minutes=2
health.check.interval.ms=60000
# Kerberos Configuration
kerberos.realm=TANIWHA-REALM
kerberos.kdc.port=${env.KERBEROS_PORT:8089}
kerberos.workdir=../kerby
# Python RDF project path
rdfbuilder.path=${env.PYPATH:mediata-rdf-builder/main.py}
rdfbuilder.csvpath=${env.PYPATH:mediata-rdf-builder/csv_files}
rdfbuilder.venv=${env.PYENV:mediata-rdf-builder/venv}
rdfbuilder.service.url=${env.PYURL:http://localhost:8000}
rdfbuilder.dependencies=${env.PYDEPL:fastapi, uvicorn, requests, typing, rdflib, morph_kgc}
rdfbuilder.port=${env.PYPORT:8000}
# Python FHIR project path
fhir.path=${env.FHIRPATH:InteroperabilityFHIRAPI}
fhir.venv=${env.FHIRPATH:InteroperabilityFHIRAPI/venv}
fhir.dependencies=${env.FHIRDEPL:numpy, spacy, nltk, scikit-learn, sentence-transformers, openai, torch, requests, farm-haystack[openai], fastapi, uvicorn}
fhir.port=${env.FHIRPORT:8001}
# server.ssl.key-store=/home/danibanez/.keystore
# server.ssl.key-store-passwoFetching classesd=changeit
# snowstorm settings
snowstorm.image=${env.SNOWSTORM_IMAGE:snomedinternational/snowstorm:latest}
snowstorm.esImage=${env.SNOWSTORM_ES_IMAGE:docker.elastic.co/elasticsearch/elasticsearch:8.11.1}
snowstorm.network=${env.SNOWSTORM_NETWORK:snowstorm-net}
snowstorm.containerName=${env.SNOWSTORM_CONTAINER:snowstorm}
snowstorm.esContainerName=${env.SNOWSTORM_ES_CONTAINER:elasticsearch}
snowstorm.hostPort=${env.SNOWSTORM_HOST_PORT:9100}
snowstorm.containerPort=${env.SNOWSTORM_CONTAINER_PORT:8080}
snowstorm.esHostPort=${env.SNOWSTORM_ES_HOST_PORT:9200}
snowstorm.esVolume=${env.SNOWSTORM_ES_VOLUME:snowstorm-es-data}
snowstorm.startupTimeoutSeconds=${env.SNOWSTORM_TIMEOUT:120}
snowstorm.disableAuth=${env.SNOWSTORM_DISABLE_AUTH:true}

python.launcher.enabled=${env.PY_LAUNCHER_ENABLED:true}
fhir.launcher.enabled=${env.FHIR_LAUNCHER_ENABLED:true}

spring.ai.model.embedding=transformers
spring.ai.embedding.transformer.onnx.modelUri=https://huggingface.co/intfloat/e5-small-v2/resolve/main/model.onnx
spring.ai.embedding.transformer.tokenizer.uri=https://huggingface.co/intfloat/e5-small-v2/raw/main/tokenizer.json

# cache downloaded model/tokenizer locally
spring.ai.embedding.transformer.cache.enabled=true
spring.ai.embedding.transformer.cache.directory=${java.io.tmpdir}/spring-ai-onnx-model

# -----------------------------------------------------------------------
# LLM-based description generation (disabled by default)
# -----------------------------------------------------------------------
# Set to true to generate richer, context-aware descriptions via a chat LLM.
# Works with Ollama (local) and any OpenAI-compatible provider.
#
# Recommended medical models (via Ollama):
#   meditron    – EPFL model trained on PubMed + clinical guidelines (7B)
#   medllama2   – LLaMA 2 fine-tuned on medical QA
#   llama3.2    – General-purpose; strong results with the built-in medical prompt
#
# Quick-start:
#   ollama pull meditron
#   # then set description.generator.llm.enabled=true and model=meditron below
#
description.generator.llm.enabled=${env.LLM_DESC_ENABLED:false}
description.generator.llm.base-url=${env.LLM_DESC_BASE_URL:http://localhost:11434}
description.generator.llm.model=${env.LLM_DESC_MODEL:llama3.2}
# Leave blank for local Ollama; set to your API key for OpenAI / hosted providers.
description.generator.llm.api-key=${env.LLM_DESC_API_KEY:}

