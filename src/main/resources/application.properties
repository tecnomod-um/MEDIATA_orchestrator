# General config
server.port=${env.PORT:8088}
server.servlet.context-path=/taniwha
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.data.mongodb.uri=${env.MONGODB_URI}
overwrite.node=true
# Security config
jwt.secret=${env.JWT_SECRET}
jwt.expiration=10800
# Logging
logging.level.org.taniwha=DEBUG
logging.file.name=logs/app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.logback.rollingpolicy.max-history=30
# Node heartbeat configs
heartbeat.timeout.minutes=2
health.check.interval.ms=60000
# Kerberos Configuration
kerberos.realm=TANIWHA-REALM
kerberos.kdc.port=${env.KERBEROS_PORT:8089}
kerberos.workdir=../kerby
# Python RDF project path
rdfbuilder.path=${env.PYPATH:mediata-rdf-builder/main.py}
rdfbuilder.csvpath=${env.PYPATH:mediata-rdf-builder/csv_files}
rdfbuilder.venv=${env.PYENV:mediata-rdf-builder/venv}
rdfbuilder.service.url=${env.PYURL:http://localhost:8000}
rdfbuilder.dependencies=${env.PYDEPL:fastapi, uvicorn, requests, typing, rdflib, morph_kgc}
rdfbuilder.port=${env.PYPORT:8000}
# Python FHIR project path
fhir.path=${env.FHIRPATH:InteroperabilityFHIRAPI}
fhir.venv=${env.FHIRPATH:InteroperabilityFHIRAPI/venv}
fhir.dependencies=${env.FHIRDEPL:numpy, spacy, nltk, scikit-learn, sentence-transformers, openai, torch, requests, farm-haystack[openai], fastapi, uvicorn}
fhir.port=${env.FHIRPORT:8001}
# server.ssl.key-store=/home/danibanez/.keystore
# server.ssl.key-store-passwoFetching classesd=changeit
# snowstorm settings
snowstorm.image=${env.SNOWSTORM_IMAGE:snomedinternational/snowstorm:latest}
snowstorm.esImage=${env.SNOWSTORM_ES_IMAGE:docker.elastic.co/elasticsearch/elasticsearch:8.11.1}
snowstorm.network=${env.SNOWSTORM_NETWORK:snowstorm-net}
snowstorm.containerName=${env.SNOWSTORM_CONTAINER:snowstorm}
snowstorm.esContainerName=${env.SNOWSTORM_ES_CONTAINER:elasticsearch}
snowstorm.hostPort=${env.SNOWSTORM_HOST_PORT:9100}
snowstorm.containerPort=${env.SNOWSTORM_CONTAINER_PORT:8080}
snowstorm.esHostPort=${env.SNOWSTORM_ES_HOST_PORT:9200}
snowstorm.esVolume=${env.SNOWSTORM_ES_VOLUME:snowstorm-es-data}
snowstorm.startupTimeoutSeconds=${env.SNOWSTORM_TIMEOUT:120}
snowstorm.disableAuth=${env.SNOWSTORM_DISABLE_AUTH:true}
snowstorm.enabled=${env.SNOWSTORM_ENABLED:true}
snowstorm.api.url=${env.SNOWSTORM_API_URL:http://localhost:9100}
snowstorm.api.branch=${env.SNOWSTORM_BRANCH:MAIN}

python.launcher.enabled=${env.PY_LAUNCHER_ENABLED:true}
fhir.launcher.enabled=${env.FHIR_LAUNCHER_ENABLED:true}

# Ollama model
ollama.model=${env.OLLAMA_MODEL:llama3:8b-instruct-q8_0}
spring.ai.ollama.chat.options.model=${env.SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL:llama3:8b-instruct-q8_0}

# Ollama launcher
ollama.launcher.enabled=${env.OLLAMA_LAUNCHER_ENABLED:true}
ollama.image=${env.OLLAMA_IMAGE:ollama/ollama:latest}
ollama.containerName=${env.OLLAMA_CONTAINER:ollama}
ollama.hostPort=${env.OLLAMA_HOST_PORT:11434}
ollama.containerPort=${env.OLLAMA_CONTAINER_PORT:11434}
ollama.startupTimeoutSeconds=${env.OLLAMA_TIMEOUT:60}
ollama.volume=${env.OLLAMA_VOLUME:ollama-models}

# Ollama Docker resource limits
ollama.docker.cpus=${env.OLLAMA_CPUS:24}
ollama.docker.memory=${env.OLLAMA_MEMORY:64g}
ollama.docker.shmSize=${env.OLLAMA_SHM_SIZE:2g}
ollama.docker.gpus=${env.OLLAMA_GPUS:}

# Ollama runtime tuning
ollama.env.numThreads=${env.OLLAMA_NUM_THREADS:24}
ollama.env.numParallel=${env.OLLAMA_NUM_PARALLEL:2}
ollama.env.maxLoadedModels=${env.OLLAMA_MAX_LOADED_MODELS:1}
ollama.env.keepAlive=${env.OLLAMA_KEEP_ALIVE:20m}

# Spring AI chat behavior (avoid 180s timeouts on CPU)
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.numPredict=256
spring.ai.ollama.chat.options.keepAlive=20m

# Cache downloaded model
spring.ai.embedding.transformer.cache.enabled=true
spring.ai.embedding.transformer.cache.directory=${java.io.tmpdir}/spring-ai-onnx-model

# LLM Text Generation Configuration
llm.enabled=${env.LLM_ENABLED:true}
spring.ai.ollama.base-url=${env.SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.enabled=${env.SPRING_AI_OLLAMA_CHAT_ENABLED:true}

# Embedding and metadata generation settings
mapping.service.max-column-desc-tasks=60
mapping.service.max-enum=120
mapping.service.schema-to-column-threshold=0.33
mapping.service.column-cluster-threshold=0.56
mapping.service.max-suggestions-per-schema-field=6
mapping.service.max-schemaless-targets=40
mapping.service.max-columns-per-mapping=10
mapping.service.noise-document-frequency-fraction=0.22
mapping.service.noise-document-frequency-min-count=4
mapping.service.suffix-noise-min-count=3
mapping.service.description-concurrency-window=2
mapping.service.description-batch-columns=6