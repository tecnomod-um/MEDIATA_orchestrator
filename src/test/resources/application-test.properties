# Test Configuration for MappingServiceReportTest
# Uses same configuration as deployment

# LLM Configuration - enabled for test
llm.enabled=true

# Ollama Configuration - connect to localhost Ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.model.chat=ollama
spring.ai.ollama.chat.options.model=openmed
spring.ai.ollama.chat.options.temperature=0.7

# Terminology inference: use the OpenMed medical model
terminology.infer.model=openmed

# Snowstorm Configuration - enabled (RDFService is mocked but configuration same as deployment)
snowstorm.enabled=true
snowstorm.api.url=http://localhost:9100
snowstorm.api.branch=MAIN

# Other test settings
spring.main.allow-bean-definition-overriding=true
logging.level.org.taniwha.service.LLMTextGenerator=DEBUG
logging.level.org.taniwha.service.ValueMappingBuilder=DEBUG
logging.level.org.springframework.ai=DEBUG
